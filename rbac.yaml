apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-rollouts-analysis-sa
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-rollouts-analysis-role
  namespace: argocd
rules:
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-rollouts-analysis-rb
  namespace: argocd
subjects:
- kind: ServiceAccount
  name: argo-rollouts-analysis-sa
  namespace: argocd
roleRef:
  kind: Role
  name: argo-rollouts-analysis-role
  apiGroup: rbac.authorization.k8s.io
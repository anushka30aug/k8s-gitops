apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: node-app
  namespace: argocd
spec:
  replicas: 2
  progressDeadlineSeconds: 60
  selector:
    matchLabels:
      app: node
  template:
    metadata:
      labels:
        app: node
    spec:
      containers:
      - name: node-container
        image: anushkashukla003/node-app:fd88ad1114cfe2a50c5b0d55b730be0e30efcf39
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          periodSeconds: 10
          failureThreshold: 5
          timeoutSeconds: 2
  strategy:
    canary:
      canaryService: node-service-canary
      stableService: node-service-stable
      steps:
      - setWeight: 20
      - analysis:
          templates:
          - templateName: node-health-check
      - pause:
          duration: 30s
      - setWeight: 50
      - pause:
          duration: 30s
      - setWeight: 100
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: node-app
  namespace: argocd
spec:
  replicas: 2

  selector:
    matchLabels:
      app: node

  template:
    metadata:
      labels:
        app: node
    spec:
      containers:
      - name: node-container
        image: anushkashukla003/node-app:89045bd22a532ecf71b8af7a0a56f52efebd9deb
        ports:
        - containerPort: 3000

        readinessProbe:
          httpGet:
            path: /health
            port: 3000

  strategy:
    canary:
      canaryService: node-service-canary
      stableService: node-service-stable

      analysis:
        templates:
        - templateName: node-health-check

      steps:
        - setWeight: 20
        - pause: { duration: 30 }

        - setWeight: 50
        - pause: { duration: 30 }

        - setWeight: 100
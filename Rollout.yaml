apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: node-app
  namespace: argocd
spec:
  replicas: 2
  progressDeadlineSeconds: 60
  selector:
    matchLabels:
      app: node
  template:
    metadata:
      labels:
        app: node
    spec:
      containers:
      - name: node-container
        image: anushkashukla003/node-app:5718d05acabed3fa22cd9548d12f765b410f34ce
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          periodSeconds: 10
          failureThreshold: 5
          timeoutSeconds: 2
  strategy:
    canary:
      canaryService: node-service-canary
      stableService: node-service-stable
      analysis:
        templates:
        - templateName: node-health-check
      steps:
      - setWeight: 20
      - pause:
          duration: 30s
      - setWeight: 50
      - pause:
          duration: 30s
      - setWeight: 100